<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Munke · Stickers Premium</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --ink:       #0d0618;
      --deep:      #130a22;
      --mid:       #1e0f35;
      --glass:     rgba(255,255,255,0.04);
      --rim:       rgba(200,160,255,0.15);
      --lavender:  #c9a8f5;
      --lilac:     #e6d5ff;
      --blush:     #f5c8e8;
      --mint:      #a8d8f0;
      --gold:      #f0d9a8;
      --text:      #ede8f5;
      --muted:     rgba(237,232,245,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--ink);
      color: var(--text);
      overflow-x: hidden;
    }

    /* ── CANVAS AURORA ── */
    #aurora {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.18;
      animation: drift 18s ease-in-out infinite alternate;
    }
    .orb1 { width: 600px; height: 600px; background: #9b59f5; top: -10%; left: -10%; animation-duration: 22s; }
    .orb2 { width: 500px; height: 500px; background: #e879c8; top: 20%; right: -15%; animation-duration: 17s; animation-delay: -8s; }
    .orb3 { width: 400px; height: 400px; background: #59b5f5; bottom: 10%; left: 20%; animation-duration: 25s; animation-delay: -4s; }
    .orb4 { width: 350px; height: 350px; background: #c9a8f5; bottom: -5%; right: 5%; animation-duration: 20s; animation-delay: -12s; }

    @keyframes drift {
      0%   { transform: translate(0,0) scale(1); }
      50%  { transform: translate(40px,-30px) scale(1.08); }
      100% { transform: translate(-30px, 20px) scale(0.96); }
    }

    /* ── NOISE OVERLAY ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
    }

    /* ── LAYOUT ── */
    section { position: relative; z-index: 2; }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 48px;
      backdrop-filter: blur(20px);
      background: rgba(13,6,24,0.6);
      border-bottom: 1px solid var(--rim);
      transition: padding 0.4s;
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.7rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: var(--lilac);
      text-transform: uppercase;
    }
    .nav-logo span { color: var(--lavender); font-style: italic; }
    .nav-links { display: flex; gap: 36px; list-style: none; }
    .nav-links a {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
    }
    .nav-links a:hover { color: var(--lilac); }
    .nav-cta {
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 10px 26px;
      border: 1px solid var(--lavender);
      color: var(--lavender);
      border-radius: 100px;
      text-decoration: none;
      transition: background 0.3s, color 0.3s;
    }
    .nav-cta:hover { background: var(--lavender); color: var(--ink); }

    /* ── HERO ── */
    #hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
    }
    .hero-badge {
      display: inline-block;
      font-size: 0.68rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--lavender);
      border: 1px solid var(--rim);
      padding: 7px 20px;
      border-radius: 100px;
      margin-bottom: 40px;
      backdrop-filter: blur(10px);
      background: var(--glass);
      animation: fadeUp 1s ease both;
    }
    .hero-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(4rem, 12vw, 9rem);
      font-weight: 300;
      line-height: 0.9;
      color: var(--lilac);
      letter-spacing: -0.01em;
      animation: fadeUp 1s 0.15s ease both;
    }
    .hero-title em {
      font-style: italic;
      color: var(--lavender);
      display: block;
    }
    .hero-sub {
      margin-top: 28px;
      font-size: 1rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      max-width: 420px;
      line-height: 1.7;
      animation: fadeUp 1s 0.3s ease both;
    }
    .hero-actions {
      margin-top: 48px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      animation: fadeUp 1s 0.45s ease both;
    }
    .btn-primary {
      padding: 14px 38px;
      background: linear-gradient(135deg, #b484f0, #e879c8);
      color: #fff;
      border: none;
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.3s, box-shadow 0.3s;
      box-shadow: 0 0 30px rgba(180,132,240,0.4);
    }
    .btn-primary:hover { transform: translateY(-3px); box-shadow: 0 0 50px rgba(180,132,240,0.6); }
    .btn-ghost {
      padding: 14px 38px;
      background: var(--glass);
      color: var(--lilac);
      border: 1px solid var(--rim);
      border-radius: 100px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-decoration: none;
      backdrop-filter: blur(10px);
      transition: border-color 0.3s, color 0.3s;
    }
    .btn-ghost:hover { border-color: var(--lavender); color: var(--lavender); }

    .hero-scroll {
      margin-top: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      animation: fadeUp 1s 0.6s ease both;
    }
    .scroll-line {
      width: 1px;
      height: 50px;
      background: linear-gradient(to bottom, transparent, var(--lavender));
      animation: scrollPulse 2s ease-in-out infinite;
    }
    @keyframes scrollPulse {
      0%, 100% { opacity: 0.3; transform: scaleY(1); }
      50%       { opacity: 1;   transform: scaleY(1.15); }
    }

    /* ── MARQUEE ── */
    .marquee-wrap {
      overflow: hidden;
      border-top: 1px solid var(--rim);
      border-bottom: 1px solid var(--rim);
      padding: 18px 0;
      background: rgba(180,132,240,0.05);
    }
    .marquee-inner {
      display: flex;
      gap: 0;
      white-space: nowrap;
      animation: marquee 20s linear infinite;
    }
    .marquee-inner span {
      padding: 0 40px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--lavender);
      letter-spacing: 0.1em;
      opacity: 0.7;
    }
    .marquee-inner span::before { content: '✦ '; color: var(--blush); }
    @keyframes marquee { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* ── PRODUCTS ── */
    #productos {
      padding: 120px 48px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .section-label {
      font-size: 0.7rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--lavender);
      margin-bottom: 16px;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 300;
      color: var(--lilac);
      line-height: 1.1;
      margin-bottom: 60px;
    }
    .section-title em { font-style: italic; color: var(--lavender); }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .product-card {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--rim);
      background: var(--glass);
      backdrop-filter: blur(20px);
      padding: 48px 36px;
      transition: transform 0.4s, border-color 0.4s, box-shadow 0.4s;
      cursor: pointer;
    }
    .product-card:hover {
      transform: translateY(-8px);
      border-color: var(--lavender);
      box-shadow: 0 20px 60px rgba(180,132,240,0.2);
    }
    .product-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(180,132,240,0.06), transparent);
      opacity: 0;
      transition: opacity 0.4s;
    }
    .product-card:hover::before { opacity: 1; }

    .product-icon {
      font-size: 3rem;
      margin-bottom: 28px;
      display: block;
      filter: drop-shadow(0 0 20px rgba(180,132,240,0.5));
    }
    .product-number {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.85rem;
      color: var(--lavender);
      letter-spacing: 0.2em;
      margin-bottom: 12px;
    }
    .product-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: var(--lilac);
      margin-bottom: 12px;
    }
    .product-desc {
      font-size: 0.85rem;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .product-tag {
      display: inline-block;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--blush);
      border: 1px solid rgba(245,200,232,0.25);
      padding: 5px 14px;
      border-radius: 100px;
    }
    .product-card.featured {
      background: linear-gradient(135deg, rgba(180,132,240,0.1), rgba(232,121,200,0.08));
      border-color: rgba(180,132,240,0.4);
      grid-row: span 2;
    }
    .product-card.featured .product-name { font-size: 2.4rem; }

    /* ── PROCESO ── */
    #proceso {
      padding: 120px 48px;
      background: linear-gradient(180deg, transparent, rgba(180,132,240,0.04), transparent);
    }
    .proceso-inner {
      max-width: 1200px;
      margin: 0 auto;
    }
    .proceso-steps {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 2px;
      margin-top: 60px;
    }
    .step {
      padding: 48px 32px;
      border-left: 1px solid var(--rim);
      position: relative;
      transition: background 0.4s;
    }
    .step:hover { background: var(--glass); }
    .step:first-child { border-left: none; }
    .step-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 4rem;
      font-weight: 300;
      color: rgba(180,132,240,0.15);
      line-height: 1;
      margin-bottom: 24px;
    }
    .step-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      color: var(--lilac);
      margin-bottom: 12px;
    }
    .step-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.7; }
    .step-dot {
      position: absolute;
      top: 50%;
      right: -1px;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--lavender);
      box-shadow: 0 0 12px var(--lavender);
    }

    /* ── ABOUT ── */
    #nosotros {
      padding: 120px 48px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 80px;
      align-items: center;
    }
    .about-visual {
      position: relative;
      height: 500px;
    }
    .about-card {
      position: absolute;
      border-radius: 20px;
      border: 1px solid var(--rim);
      backdrop-filter: blur(20px);
      background: var(--glass);
      padding: 32px;
      transition: transform 0.3s;
    }
    .about-card:hover { transform: scale(1.03); }
    .card-main {
      width: 280px; height: 340px;
      top: 20px; left: 20px;
      background: linear-gradient(160deg, rgba(180,132,240,0.1), rgba(13,6,24,0.5));
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .card-main-emoji { font-size: 5rem; margin-bottom: 16px; }
    .card-main-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      color: var(--lilac);
      font-style: italic;
    }
    .card-stat {
      width: 180px; height: 130px;
      top: 10px; right: 20px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      text-align: center;
    }
    .stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      color: var(--lavender);
      line-height: 1;
    }
    .stat-label { font-size: 0.72rem; letter-spacing: 0.15em; color: var(--muted); margin-top: 6px; }
    .card-tag {
      width: 200px; height: 80px;
      bottom: 60px; right: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .tag-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blush); flex-shrink: 0; }
    .tag-text { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }

    .about-content .section-title { margin-bottom: 24px; }
    .about-text {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.85;
      margin-bottom: 40px;
    }
    .about-features { display: flex; flex-direction: column; gap: 16px; }
    .feature {
      display: flex;
      align-items: flex-start;
      gap: 16px;
    }
    .feature-icon {
      width: 36px; height: 36px;
      border-radius: 10px;
      background: var(--glass);
      border: 1px solid var(--rim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .feature-text { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
    .feature-text strong { color: var(--lilac); font-weight: 500; display: block; margin-bottom: 2px; }

    /* ── TESTIMONIALS ── */
    #testimonios {
      padding: 120px 48px;
      background: linear-gradient(180deg, transparent, rgba(180,132,240,0.03), transparent);
    }
    .testimonios-inner { max-width: 1200px; margin: 0 auto; }
    .testimonios-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 60px;
    }
    .testi-card {
      padding: 36px;
      border-radius: 20px;
      border: 1px solid var(--rim);
      background: var(--glass);
      backdrop-filter: blur(20px);
      transition: transform 0.3s, border-color 0.3s;
    }
    .testi-card:hover { transform: translateY(-5px); border-color: rgba(180,132,240,0.3); }
    .testi-stars { color: var(--gold); font-size: 0.9rem; margin-bottom: 20px; letter-spacing: 2px; }
    .testi-quote {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--lilac);
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .testi-author { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.1em; }
    .testi-author span { color: var(--lavender); }

    /* ── CTA ── */
    #contacto {
      padding: 120px 48px;
      text-align: center;
    }
    .cta-inner {
      max-width: 700px;
      margin: 0 auto;
      padding: 80px 60px;
      border-radius: 30px;
      border: 1px solid var(--rim);
      background: linear-gradient(135deg, rgba(180,132,240,0.08), rgba(232,121,200,0.06));
      backdrop-filter: blur(20px);
      position: relative;
      overflow: hidden;
    }
    .cta-inner::before {
      content: '';
      position: absolute;
      inset: -1px;
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(180,132,240,0.3), transparent, rgba(232,121,200,0.2));
      z-index: -1;
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      padding: 1px;
    }
    .cta-emoji { font-size: 3rem; margin-bottom: 24px; display: block; }
    .cta-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3rem;
      font-weight: 300;
      color: var(--lilac);
      margin-bottom: 16px;
      line-height: 1.1;
    }
    .cta-title em { font-style: italic; color: var(--lavender); }
    .cta-sub { font-size: 0.92rem; color: var(--muted); margin-bottom: 40px; line-height: 1.7; }
    .cta-links { display: flex; justify-content: center; gap: 16px; flex-wrap: wrap; }

    /* ── FOOTER ── */
    footer {
      position: relative;
      z-index: 2;
      padding: 48px;
      border-top: 1px solid var(--rim);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }
    .footer-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      letter-spacing: 0.3em;
      color: var(--lavender);
    }
    .footer-copy { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.05em; }
    .footer-links { display: flex; gap: 24px; }
    .footer-links a { font-size: 0.75rem; color: var(--muted); text-decoration: none; letter-spacing: 0.1em; transition: color 0.3s; }
    .footer-links a:hover { color: var(--lavender); }

    /* ── FLOATING PARTICLES ── */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }
    .particle {
      position: absolute;
      border-radius: 50%;
      animation: float linear infinite;
      opacity: 0;
    }
    @keyframes float {
      0%   { transform: translateY(110vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.5; }
      90%  { opacity: 0.3; }
      100% { transform: translateY(-10vh) rotate(720deg); opacity: 0; }
    }

    /* ── FADE UP ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .reveal {
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      nav { padding: 18px 24px; }
      .nav-links, .nav-cta { display: none; }
      #productos { padding: 80px 24px; }
      .products-grid { grid-template-columns: 1fr; }
      .product-card.featured { grid-row: auto; }
      .proceso-steps { grid-template-columns: 1fr 1fr; gap: 0; }
      .step-dot { display: none; }
      #nosotros { padding: 80px 24px; }
      .about-grid { grid-template-columns: 1fr; gap: 40px; }
      .about-visual { height: 280px; }
      #testimonios { padding: 80px 24px; }
      .testimonios-grid { grid-template-columns: 1fr; }
      #contacto { padding: 80px 24px; }
      .cta-inner { padding: 48px 24px; }
      footer { padding: 32px 24px; flex-direction: column; text-align: center; }
    }
  </style>
</head>
<body>

<!-- AURORA BACKGROUND -->
<div id="aurora">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
</div>

<!-- PARTICLES -->
<div class="particles" id="particles"></div>

<!-- NAV -->
<nav>
  <div class="nav-logo">M<span>unke</span></div>
  <ul class="nav-links">
    <li><a href="#productos">Productos</a></li>
    <li><a href="#proceso">Proceso</a></li>
    <li><a href="#nosotros">Nosotros</a></li>
    <li><a href="#testimonios">Reseñas</a></li>
  </ul>
  <a href="#contacto" class="nav-cta">Pedir ahora</a>
</nav>

<!-- HERO -->
<section id="hero">
  <div class="hero-badge">✦ Stickers Premium · Diseño a
